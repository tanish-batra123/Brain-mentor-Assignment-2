<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News</title>
    <link rel="stylesheet" href="style.css" />
    <script src="src/controllers/newsControllers.js" type="module"></script>
  </head>
  <body>
    <aside class="sidebar">
      <div class="language">
        <button class="active">English</button>
        <button>हिन्दी</button>
      </div>

      <h3>Categories</h3>

      <ul class="category-list">
        <li class="general">General</li>
        <li class="Business">Business</li>
        <li class="Politics">Politics</li>
        <li class="Sports">Sports</li>
        <li class="Technology">Technology</li>
        <li class="Entertainment">Entertainment</li>
        <li class="Science">Science</li>
        <li class="Health">Health</li>
      </ul>
    </aside>

    <main>
      <header>
        <span class="open-close">
          <span class="hamburger-icon">☰</span>
          <span class="menu">Menu</span>
        </span>

        <img
          src="https://assets.inshorts.com/website_assets/images/logo_inshorts.png "
          width="140"
        />
      </header>

      <!-- News Section -->

      <section class="news-container">
        <div class="best-experience">
          <p>for best experience use inshort app on your phone</p>
          <div class="download">
            <img
              src="https://assets.inshorts.com/website_assets/images/appstore.png"
              alt=""
              width="110"
            />
            <img
              src="https://assets.inshorts.com/website_assets/images/playstore.png"
              alt=""
              width="110"
            />
          </div>
        </div>

        <div class="news-list"></div>
      </section>

      <div class="btn-div">
     
      </div>
    </main>

    <footer>
      <div class="footer-left">
        <div class="footer-left-1">
          <img
            src="https://assets.inshorts.com/website_assets/images/logo_footer.png"
            width="150"
            alt=""
          />
          <div>
            <p><span>inshort</span> pte.Ltd</p>
            <p>@ copyRight 2026</p>
          </div>
        </div>
        <hr />
        <div class="footer-left-2">
          <p>Contact Us</p>
          <p>Terms & Conitions</p>
          <p>Privcay and policies</p>
        </div>
      </div>
      <div class="footer-right">
        <img
          src="https://assets.inshorts.com/website_assets/images/facebook.png"
          alt="facebook"
        />
        <img
          src="https://assets.inshorts.com/website_assets/images/twitter.png"
          alt="facebook"
        />
        <img
          src="https://assets.inshorts.com/website_assets/images/linkedin.png"
          alt="facebook"
        />
      </div>
    </footer>
  </body>
</html>
